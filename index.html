<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to My Website</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #e0e0e0;
    }

    .card {
      text-align: center;
      padding: 3rem 4rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 1.5rem;
      backdrop-filter: blur(10px);
      max-width: 600px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e94560, #0f3460);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin: 0 auto 1.5rem;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(90deg, #e94560, #a29bfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 1rem;
      color: #a0a0b0;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #e94560, #a29bfe);
      border-radius: 2px;
      margin: 0 auto 2rem;
    }

    .links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 0.6rem 1.4rem;
      border-radius: 2rem;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
    }

    .btn-primary {
      background: linear-gradient(135deg, #e94560, #c0392b);
      color: #fff;
    }

    .btn-secondary {
      background: transparent;
      color: #a29bfe;
      border: 1px solid #a29bfe;
    }

    .footer-note {
      margin-top: 2.5rem;
      font-size: 0.78rem;
      color: #606080;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👋</div>
    <h1>Welcome!</h1>
    <p class="tagline">
      This is my little corner of the web — a place I use to
      explore, experiment, and practice building things.
    </p>
    <div class="divider"></div>
    <div class="links">
      <a class="btn btn-primary" href="#" aria-label="Get started with the website">Get Started</a>
      <a class="btn btn-secondary" href="#" aria-label="Learn more about this project">Learn More</a>
    </div>
    <p class="footer-note">More coming soon &mdash; stay tuned!</p>
  </div>
</body>
</html>
